import java.nio.file.Files
import java.nio.file.StandardCopyOption

plugins {
    alias(libs.plugins.android.application) apply false
    alias(libs.plugins.android.library) apply false
}

def apktoolJar = layout.projectDirectory.file('jar/3rd/apktool_2.11.0.jar')
def releaseApk = project(':app').layout.buildDirectory.file('outputs/apk/release/app-release-unsigned.apk')
def spiderTemplate = layout.projectDirectory.dir('jar/spider.jar')
def spiderJarFile = layout.projectDirectory.file('jar/custom_spider.jar')
def spiderMd5File = layout.projectDirectory.file('jar/custom_spider.jar.md5')
def spiderCheckScript = layout.projectDirectory.file('jar/checkJar.ps1')
def spiderWorkDir = layout.buildDirectory.dir('spiderJar')
def decodedDir = spiderWorkDir.map { it.dir('decoded') }
def stagedDir = spiderWorkDir.map { it.dir('project') }

tasks.register('clean', Delete) {
    delete rootProject.layout.buildDirectory
}

def decodeSpiderJar = tasks.register('decodeSpiderJar', JavaExec) {
    group = 'build'
    description = 'Extracts the R8 output needed by the spider JAR.'
    dependsOn ':app:assembleRelease'
    classpath = files(apktoolJar)
    mainClass.set('brut.apktool.Main')
    inputs.file(releaseApk)
    outputs.dir(decodedDir)
    doFirst {
        setArgs(['d', '-f', '-r', '--only-main-classes', releaseApk.get().asFile.absolutePath, '-o', decodedDir.get().asFile.absolutePath])
    }
}

def prepareSpiderJar = tasks.register('prepareSpiderJar', Sync) {
    group = 'build'
    description = 'Stages the filtered spider and JavaScript packages.'
    dependsOn decodeSpiderJar
    from(spiderTemplate)
    from(decodedDir.map { it.dir('smali/com/github/catvod/spider') }) {
        into 'smali/com/github/catvod/spider'
    }
    from(decodedDir.map { it.dir('smali/com/github/catvod/js') }) {
        into 'smali/com/github/catvod/js'
    }
    into(stagedDir)
}

def generateSpiderJar = tasks.register('generateSpiderJar', JavaExec) {
    group = 'build'
    description = 'Builds custom_spider.jar from the staged dex classes.'
    dependsOn prepareSpiderJar
    classpath = files(apktoolJar)
    mainClass.set('brut.apktool.Main')
    inputs.file(stagedDir.map { it.file('apktool.yml') })
    inputs.dir(stagedDir.map { it.dir('original') })
    inputs.dir(stagedDir.map { it.dir('smali') })
    outputs.file(spiderJarFile)
    doFirst {
        Files.deleteIfExists(spiderJarFile.asFile.toPath())
        setArgs(['b', stagedDir.get().asFile.absolutePath, '-c', '-o', spiderJarFile.asFile.absolutePath])
    }
}

def verifySpiderJar = tasks.register('verifySpiderJar', Exec) {
    group = 'verification'
    description = 'Checks the generated spider JAR structure and references.'
    dependsOn generateSpiderJar
    inputs.files(spiderJarFile, spiderCheckScript, apktoolJar)
    outputs.file(spiderMd5File)
    outputs.upToDateWhen { false }
    doFirst {
        ant.checksum(file: spiderJarFile.asFile, algorithm: 'MD5', fileext: '.md5', forceOverwrite: true)
    }
    commandLine 'powershell', '-NoProfile', '-ExecutionPolicy', 'Bypass', '-File', spiderCheckScript.asFile.absolutePath, '-Jar', spiderJarFile.asFile.absolutePath
}

tasks.register('spiderJar') {
    group = 'build'
    description = 'Tests, builds, verifies, and optionally exports custom_spider.jar.'
    dependsOn verifySpiderJar
    doLast {
        def output = providers.gradleProperty('spiderOutput').getOrNull()
        if (output) {
            def requested = file(output)
            def target = output.toLowerCase(Locale.ROOT).endsWith('.jar') ? requested : new File(requested, spiderJarFile.asFile.name)
            Files.createDirectories(target.parentFile.toPath())
            Files.copy(spiderJarFile.asFile.toPath(), target.toPath(), StandardCopyOption.REPLACE_EXISTING)
            Files.copy(spiderMd5File.asFile.toPath(), new File(target.absolutePath + '.md5').toPath(), StandardCopyOption.REPLACE_EXISTING)
            logger.lifecycle("Exported ${target.absolutePath}")
        }
    }
}
